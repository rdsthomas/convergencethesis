baseURL = "https://convergencethesis.com/"
languageCode = "en"
title = "The Convergence Thesis"
theme = "convergence"

[params]
  description = "AI, Robotics, and Crypto Will Reshape the Global Economy. Here's the Investment Map."
  author = "Thomas Huhn"
  tagline = "The Machine Economy Is Coming. Position Yourself Now."
  newsletterEnabled = true
  newsletterProvider = "buttondown"
  newsletterHandle = "convergencethesis"
  linkedin = "https://www.linkedin.com/in/thomashuhn/"
  twitter = ""

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "The Thesis"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Book"
    url = "/book/"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menu.main]]
    name = "Subscribe"
    url = "/subscribe/"
    weight = 5

[sitemap]
  changefreq = "weekly"
  priority = 0.5
