  author = "Thomas Huhn"
  tagline = "Why AI, Robotics, and Crypto Represent the Greatest Investment Opportunity of Our Lifetime"
  # Newsletter signup (Buttondown)
  newsletterEnabled = true
  newsletterProvider = "buttondown"
  newsletterHandle = "convergencethesis"
  # Social
  linkedin = "https://www.linkedin.com/in/thomashuhn/"
