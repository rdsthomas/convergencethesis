{{ define "main" }}
<section class="page-content">
  <div class="page-header reveal">
    <h1>{{ .Title }}</h1>
  </div>
  <div class="page-body">
    {{ .Content }}
    {{ range .Pages }}
    <article class="post-summary reveal">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      {{ with .Summary }}<p>{{ . }}</p>{{ end }}
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
