<header class="site-header">
  <div class="container">
    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="logo-text">Maschinengeld</span>
      </a>
      <button class="nav-toggle" aria-label="Menü" onclick="document.querySelector('.nav-links').classList.toggle('active')">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
        {{ end }}
      </div>
    </nav>
  </div>
</header>
